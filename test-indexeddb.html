<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste IndexedDB - ADJPA ERP</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        .log { background: #f5f5f5; padding: 10px; margin: 10px 0; border-radius: 5px; font-family: monospace; white-space: pre-wrap; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <h1>🧪 Teste IndexedDB - ADJPA ERP</h1>
    
    <div>
        <button onclick="testSave()">💾 Salvar Dados Teste</button>
        <button onclick="testLoad()">📂 Carregar Dados</button>
        <button onclick="testClear()">🧹 Limpar Dados</button>
        <button onclick="clearLog()">🗑️ Limpar Log</button>
    </div>
    
    <div id="log" class="log"></div>

    <script>
        const dbName = 'ADJPA_ERP_DB';
        const version = 1;
        let db = null;

        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML += `<div class="${type}">[${timestamp}] ${message}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        async function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(dbName, version);

                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    log('✅ IndexedDB inicializado com sucesso', 'success');
                    resolve(db);
                };

                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    
                    if (!db.objectStoreNames.contains('members')) {
                        db.createObjectStore('members', { keyPath: 'id' });
                        log('📁 Store members criada', 'info');
                    }
                };
            });
        }

        async function testSave() {
            try {
                if (!db) await initDB();
                
                const testData = {
                    id: `test_${Date.now()}`,
                    name: 'Membro Teste',
                    email: 'teste@exemplo.com',
                    unitId: 'u-sede',
                    createdAt: new Date().toISOString()
                };

                const transaction = db.transaction(['members'], 'readwrite');
                const store = transaction.objectStore('members');
                const request = store.put(testData);

                request.onsuccess = () => {
                    log(`💾 Dado salvo: ${testData.name} (${testData.id})`, 'success');
                };

                request.onerror = () => {
                    log(`❌ Erro ao salvar: ${request.error}`, 'error');
                };

            } catch (error) {
                log(`❌ Erro geral: ${error.message}`, 'error');
            }
        }

        async function testLoad() {
            try {
                if (!db) await initDB();
                
                const transaction = db.transaction(['members'], 'readonly');
                const store = transaction.objectStore('members');
                const request = store.getAll();

                request.onsuccess = () => {
                    const data = request.result;
                    log(`📂 Encontrados ${data.length} itens:`, 'info');
                    data.forEach(item => {
                        log(`  - ${item.name} (${item.id})`, 'info');
                    });
                };

                request.onerror = () => {
                    log(`❌ Erro ao carregar: ${request.error}`, 'error');
                };

            } catch (error) {
                log(`❌ Erro geral: ${error.message}`, 'error');
            }
        }

        async function testClear() {
            try {
                if (!db) await initDB();
                
                const transaction = db.transaction(['members'], 'readwrite');
                const store = transaction.objectStore('members');
                const request = store.clear();

                request.onsuccess = () => {
                    log('🧹 Store members limpa com sucesso', 'success');
                };

                request.onerror = () => {
                    log(`❌ Erro ao limpar: ${request.error}`, 'error');
                };

            } catch (error) {
                log(`❌ Erro geral: ${error.message}`, 'error');
            }
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }

        // Inicializar ao carregar
        window.onload = async () => {
            log('🚀 Iniciando teste IndexedDB...', 'info');
            try {
                await initDB();
                log('🎯 Sistema pronto para testes!', 'success');
            } catch (error) {
                log(`❌ Falha na inicialização: ${error.message}`, 'error');
            }
        };
    </script>
</body>
</html>

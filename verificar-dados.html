<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Verificar Dados ADJPA ERP</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        .result { background: #f5f5f5; padding: 10px; margin: 10px 0; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>🔍 Verificar Dados do Sistema</h1>
    
    <button onclick="verificarDados()">📊 Verificar Dados Salvos</button>
    <button onclick="limparDados()">🧹 Limpar Tudo</button>
    <button onclick="recarregarSistema()">🔄 Recarregar Sistema</button>
    
    <div id="resultado" class="result"></div>

    <script>
        function log(msg) {
            document.getElementById('resultado').innerHTML += '<div>' + msg + '</div>';
        }

        async function verificarDados() {
            document.getElementById('resultado').innerHTML = '';
            log('🔍 Verificando dados no IndexedDB...');
            
            try {
                const request = indexedDB.open('ADJPA_ERP_DB', 1);
                
                request.onsuccess = function(event) {
                    const db = event.target.result;
                    log('✅ Banco de dados encontrado: ' + db.name);
                    log('📁 Stores disponíveis: ' + Array.from(db.objectStoreNames).join(', '));
                    
                    // Verificar members
                    if (db.objectStoreNames.contains('members')) {
                        const transaction = db.transaction('members', 'readonly');
                        const store = transaction.objectStore('members');
                        const getRequest = store.getAll();
                        
                        getRequest.onsuccess = function() {
                            const members = getRequest.result;
                            log('👥 Membros encontrados: ' + members.length);
                            members.forEach((member, index) => {
                                log(`  ${index + 1}. ${member.name} (${member.id})`);
                            });
                        };
                    }
                    
                    // Verificar transactions
                    if (db.objectStoreNames.contains('transactions')) {
                        const transaction = db.transaction('transactions', 'readonly');
                        const store = transaction.objectStore('transactions');
                        const getRequest = store.getAll();
                        
                        getRequest.onsuccess = function() {
                            const transactions = getRequest.result;
                            log('💰 Transações encontradas: ' + transactions.length);
                        };
                    }
                    
                    // Verificar accounts
                    if (db.objectStoreNames.contains('accounts')) {
                        const transaction = db.transaction('accounts', 'readonly');
                        const store = transaction.objectStore('accounts');
                        const getRequest = store.getAll();
                        
                        getRequest.onsuccess = function() {
                            const accounts = getRequest.result;
                            log('🏦 Contas encontradas: ' + accounts.length);
                        };
                    }
                    
                    log('✅ Verificação concluída!');
                };
                
                request.onerror = function() {
                    log('❌ Erro ao abrir banco: ' + request.error);
                };
                
            } catch (error) {
                log('❌ Erro geral: ' + error.message);
            }
        }

        function limparDados() {
            if (confirm('Tem certeza que deseja limpar todos os dados?')) {
                log('🧹 Limpando IndexedDB...');
                const deleteRequest = indexedDB.deleteDatabase('ADJPA_ERP_DB');
                
                deleteRequest.onsuccess = function() {
                    log('✅ Dados limpos com sucesso!');
                    log('📝 Recarregue a página do sistema para recriar o banco');
                };
                
                deleteRequest.onerror = function() {
                    log('❌ Erro ao limpar: ' + deleteRequest.error);
                };
            }
        }

        function recarregarSistema() {
            window.open('http://localhost:3000', '_blank');
        }

        // Verificar automaticamente ao carregar
        window.onload = function() {
            log('🚀 Página de verificação carregada');
            log('💡 Use o botão "Verificar Dados Salvos" para ver o que está armazenado');
        };
    </script>
</body>
</html>

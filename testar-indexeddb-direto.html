<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Testar IndexedDB Direto</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        button:hover { background: #0056b3; }
        .log { background: #f5f5f5; padding: 10px; margin: 10px 0; border-radius: 5px; font-family: monospace; white-space: pre-wrap; max-height: 400px; overflow-y: auto; }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
    </style>
</head>
<body>
    <h1>🧪 Teste Direto do IndexedDB</h1>
    
    <div>
        <button onclick="initDB()">1. Inicializar DB</button>
        <button onclick="salvarTeste()">2. Salvar Dado Teste</button>
        <button onclick="carregarDados()">3. Carregar Dados</button>
        <button onclick="limparDados()">4. Limpar Tudo</button>
        <button onclick="verificarDB()">5. Verificar Estado</button>
    </div>
    
    <div id="log" class="log"></div>

    <script>
        let db = null;
        const dbName = 'ADJPA_ERP_DB';
        const version = 1;

        function log(msg, type = 'info') {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            const className = type === 'success' ? 'success' : type === 'error' ? 'error' : 'info';
            logDiv.innerHTML += `<div class="${className}">[${timestamp}] ${msg}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        async function initDB() {
            log('🚀 Inicializando IndexedDB...', 'info');
            
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(dbName, version);

                request.onerror = () => {
                    log('❌ Erro ao abrir banco: ' + request.error, 'error');
                    reject(request.error);
                };

                request.onsuccess = () => {
                    db = request.result;
                    log('✅ IndexedDB inicializado com sucesso', 'success');
                    log('📁 Stores disponíveis: ' + Array.from(db.objectStoreNames).join(', '), 'info');
                    resolve(db);
                };

                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    
                    log('🔄 Criando stores...', 'info');
                    
                    if (!db.objectStoreNames.contains('members')) {
                        db.createObjectStore('members', { keyPath: 'id' });
                        log('📁 Store members criada', 'success');
                    }
                    
                    if (!db.objectStoreNames.contains('transactions')) {
                        db.createObjectStore('transactions', { keyPath: 'id' });
                        log('📁 Store transactions criada', 'success');
                    }
                    
                    if (!db.objectStoreNames.contains('accounts')) {
                        db.createObjectStore('accounts', { keyPath: 'id' });
                        log('📁 Store accounts criada', 'success');
                    }
                };
            });
        }

        async function salvarTeste() {
            if (!db) {
                log('❌ Banco não inicializado. Execute o passo 1 primeiro.', 'error');
                return;
            }

            const testData = {
                id: `test_${Date.now()}`,
                name: 'Membro Teste Direto',
                email: 'teste@direto.com',
                unitId: 'u-sede',
                createdAt: new Date().toISOString(),
                test: true
            };

            log('💾 Salvando dado teste...', 'info');

            const transaction = db.transaction(['members'], 'readwrite');
            const store = transaction.objectStore('members');
            const request = store.put(testData);

            request.onsuccess = () => {
                log('✅ Dado salvo com sucesso: ' + testData.name, 'success');
                log('📋 ID: ' + testData.id, 'info');
            };

            request.onerror = () => {
                log('❌ Erro ao salvar: ' + request.error, 'error');
            };
        }

        async function carregarDados() {
            if (!db) {
                log('❌ Banco não inicializado. Execute o passo 1 primeiro.', 'error');
                return;
            }

            log('📂 Carregando dados...', 'info');

            const transaction = db.transaction(['members'], 'readonly');
            const store = transaction.objectStore('members');
            const request = store.getAll();

            request.onsuccess = () => {
                const data = request.result;
                log('📊 Encontrados ' + data.length + ' itens:', 'info');
                
                data.forEach((item, index) => {
                    log(`  ${index + 1}. ${item.name} (${item.id})`, 'info');
                });
                
                if (data.length === 0) {
                    log('⚠️ Nenhum dado encontrado', 'error');
                }
            };

            request.onerror = () => {
                log('❌ Erro ao carregar: ' + request.error, 'error');
            };
        }

        function limparDados() {
            if (!db) {
                log('❌ Banco não inicializado. Execute o passo 1 primeiro.', 'error');
                return;
            }

            if (!confirm('Tem certeza que deseja limpar todos os dados?')) {
                return;
            }

            log('🧹 Limpando store members...', 'info');

            const transaction = db.transaction(['members'], 'readwrite');
            const store = transaction.objectStore('members');
            const request = store.clear();

            request.onsuccess = () => {
                log('✅ Store members limpa com sucesso', 'success');
            };

            request.onerror = () => {
                log('❌ Erro ao limpar: ' + request.error, 'error');
            };
        }

        function verificarDB() {
            log('🔍 Verificando estado do IndexedDB...', 'info');
            
            // Verificar se o banco existe
            const request = indexedDB.open(dbName, version);
            
            request.onsuccess = function(event) {
                const db = event.target.result;
                log('✅ Banco accessible: ' + db.name, 'success');
                log('📁 Stores: ' + Array.from(db.objectStoreNames).join(', '), 'info');
                
                // Verificar se há dados
                const transaction = db.transaction(['members'], 'readonly');
                const store = transaction.objectStore('members');
                const countRequest = store.count();
                
                countRequest.onsuccess = function() {
                    log('📊 Total de membros: ' + countRequest.result, 'info');
                };
            };
            
            request.onerror = function() {
                log('❌ Erro ao acessar banco: ' + request.error, 'error');
            };
        }

        // Inicialização automática
        window.onload = function() {
            log('🎯 Página carregada - Pronta para testar IndexedDB', 'info');
            log('💡 Execute os botões em ordem para testar a persistência', 'info');
        };
    </script>
</body>
</html>
